name: Deploy online book
# Rebuilt repository deployment workflow.

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/deploy-book.yml"
      - "book/**"
      - "tools/validate_online_book.py"
      - "tests/test_validate_online_book.py"
      - "references/**"
      - "01_课程章节索引/**"
      - "02_方法笔记/**"
      - "03_文献笔记/**"
      - "04_实验记录/**"
      - "07_研究工作台/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r book/requirements.txt

      - name: Test online book validator
        run: python -m unittest tests.test_validate_online_book

      - name: Validate online book
        run: python tools/validate_online_book.py --map book/book_map.toml --book-root book/docs

      - name: Build MkDocs site
        run: python -m mkdocs build -f book/mkdocs.yml --strict

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: book/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
