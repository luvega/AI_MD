<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子化学(QC) vs 分子力学(MM) 深度对比</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --qc-color: #8bb4f7;
            --mm-color: #81c995;
            --accent: #4a4a4a;
            --border-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background-color: var(--panel-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status-bar {
            text-align: right;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .status-val { color: #fff; font-weight: bold; }

        /* Comparison Panels */
        .comparison-area {
            display: flex;
            gap: 20px;
            min-height: 380px;
            margin-bottom: 30px;
        }

        .panel {
            flex: 1;
            background: #252525;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .qc-panel { border-top: 4px solid var(--qc-color); }
        .mm-panel { border-top: 4px solid var(--mm-color); }

        .panel-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .qc-panel .panel-title { color: var(--qc-color); }
        .mm-panel .panel-title { color: var(--mm-color); }

        .panel-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .content-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Dynamic Content Styles */
        .dramatic-time {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 15px 0;
            line-height: 1.2;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .qc-panel .dramatic-time { color: #ff6b6b; }
        .mm-panel .dramatic-time { color: var(--mm-color); }

        .time-metaphor {
            font-size: 1rem;
            color: var(--text-muted);
            font-style: italic;
            max-width: 80%;
        }

        .info-box {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 8px;
            width: 80%;
            margin-bottom: 15px;
            font-size: 1.1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .warning-badge {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
            border: 1px solid rgba(255, 71, 87, 0.5);
        }

        /* Controls */
        .controls-area {
            background: #252525;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        select {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: var(--qc-color); }

        .slider-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: var(--accent);
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -7px;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .atom-badge {
            background: var(--bg-color);
            border: 1px solid var(--accent);
            padding: 8px 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.1rem;
            min-width: 80px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>量子化学 (QC) vs 分子力学 (MM)</h1>
        <div class="status-bar">
            当前体系: <span class="status-val" id="top-atoms">1,000</span> 原子<br>
            QC 复杂度: <span class="status-val">O(N³)</span> | MM 复杂度: <span class="status-val">O(N log N)</span>
        </div>
    </div>

    <div class="comparison-area">
        <div class="panel qc-panel">
            <div class="panel-title">量子化学 (QC)</div>
            <div class="panel-subtitle">第一性原理 / 电子波函数</div>
            <div class="content-display" id="qc-display">
                </div>
        </div>

        <div class="panel mm-panel">
            <div class="panel-title">分子力学 (MM)</div>
            <div class="panel-subtitle">经验力场 / 原子球棍模型</div>
            <div class="content-display" id="mm-display">
                </div>
        </div>
    </div>

    <div class="controls-area">
        <div class="control-group">
            <label style="color: var(--text-muted); font-weight: bold;">比较维度</label>
            <select id="dimension-select">
                <option value="cost">计算成本 (核心演示)</option>
                <option value="principle">核心原理</option>
                <option value="scale">适用规模</option>
                <option value="accuracy">精度水平</option>
                <option value="app">主要应用</option>
            </select>
        </div>

        <div class="slider-container">
            <label style="color: var(--text-muted); font-weight: bold; white-space: nowrap;">体系大小</label>
            <input type="range" id="atom-slider" min="0" max="11" value="2">
            <div class="atom-badge" id="bottom-atoms">100</div>
        </div>
    </div>
</div>

<script>
    // 预设的原子数量阶梯，让拖动更有演示节奏感
    const atomSteps = [10, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000, 50000, 100000];
    
    const slider = document.getElementById('atom-slider');
    const dimensionSelect = document.getElementById('dimension-select');
    const qcDisplay = document.getElementById('qc-display');
    const mmDisplay = document.getElementById('mm-display');
    const topAtoms = document.getElementById('top-atoms');
    const bottomAtoms = document.getElementById('bottom-atoms');

    // 格式化时间为夸张单位
    function formatQCTime(hours) {
        if (hours < 0.016) return { val: (hours * 3600).toFixed(1) + " 秒", meta: "眨眼之间" };
        if (hours < 1) return { val: (hours * 60).toFixed(1) + " 分钟", meta: "喝杯咖啡的时间" };
        if (hours < 24) return { val: hours.toFixed(1) + " 小时", meta: "睡一觉就好了" };
        if (hours < 8760) return { val: (hours / 24).toFixed(1) + " 天", meta: "需要耐心等待几天" };
        
        const years = hours / 8760;
        if (years < 100) return { val: Math.round(years) + " 年", meta: "足够熬白科学家的头发" };
        if (years < 10000) return { val: Math.round(years) + " 年", meta: "人类文明史" };
        if (years < 100000000) return { val: (years / 10000).toFixed(2) + " 万年", meta: "恐龙灭绝的尺度" };
        if (years < 13800000000) return { val: (years / 100000000).toFixed(2) + " 亿年", meta: "地球地质年代跨度" };
        
        return { val: "超过 138 亿年", meta: "需要从宇宙大爆炸算到今天，且算不完" };
    }

    function formatMMTime(hours) {
        if (hours < 0.016) return { val: "< 1 分钟", meta: "瞬间完成" };
        if (hours < 1) return { val: (hours * 60).toFixed(1) + " 分钟", meta: "去趟洗手间的时间" };
        if (hours < 24) return { val: hours.toFixed(1) + " 小时", meta: "常规计算任务" };
        return { val: (hours / 24).toFixed(1) + " 天", meta: "需要跑几天集群" };
    }

    function calculateTimes(N) {
        // MM基准: 10,000原子 = 12小时。 O(N log N)
        const mmBase = 10000 * Math.log2(10000);
        let mmHours = (N * Math.log2(N)) / mmBase * 12;

        // QC基准: 100原子 = 1分钟 (1/60小时)。 O(N^3)
        let qcHours = Math.pow(N / 100, 3) * (1/60);

        return { mm: formatMMTime(mmHours), qc: formatQCTime(qcHours), qcRawHours: qcHours };
    }

    function updateView() {
        const N = atomSteps[slider.value];
        const dim = dimensionSelect.value;
        const times = calculateTimes(N);

        topAtoms.innerText = N.toLocaleString();
        bottomAtoms.innerText = N.toLocaleString();

        let qcHTML = '';
        let mmHTML = '';

        switch(dim) {
            case 'cost':
                // 计算成本的核心夸张演示
                qcHTML = `
                    <div style="color:var(--text-muted);">预计耗时</div>
                    <div class="dramatic-time" style="font-size: ${times.qcRawHours > 876000 ? '2.2rem' : '2.8rem'};">${times.qc.val}</div>
                    <div class="time-metaphor">"${times.qc.meta}"</div>
                    ${times.qcRawHours > 8760 ? '<div class="warning-badge">计算体系崩溃：不可计算</div>' : ''}
                `;
                mmHTML = `
                    <div style="color:var(--text-muted);">预计耗时</div>
                    <div class="dramatic-time">${times.mm.val}</div>
                    <div class="time-metaphor">"${times.mm.meta}"</div>
                `;
                break;
            case 'principle':
                qcHTML = `<div class="info-box">薛定谔方程 HΨ = EΨ</div><div class="info-box">计算电子云密度</div><div class="info-box">化学键可断裂</div>`;
                mmHTML = `<div class="info-box">经典牛顿力学 F = ma</div><div class="info-box">势能函数 E = ΣV</div><div class="info-box">预设的固定拓扑(弹簧)</div>`;
                break;
            case 'scale':
                const qcFeasible = N <= 500 ? "完全可行" : "极其困难/不可行";
                qcHTML = `<div class="dramatic-time" style="font-size: 2rem; color: ${N <= 500 ? 'var(--qc-color)' : '#ff6b6b'};">${qcFeasible}</div>
                          <div class="time-metaphor">典型限制：数百个原子</div>`;
                mmHTML = `<div class="dramatic-time" style="font-size: 2rem; color: var(--mm-color);">毫无压力</div>
                          <div class="time-metaphor">可轻松处理百万原子系统 (如全病毒)</div>`;
                break;
            case 'accuracy':
                qcHTML = `<div class="info-box">最高物理精度</div><div class="info-box">包含极化与电荷转移效应</div><div class="info-box">不依赖外部参数</div>`;
                mmHTML = `<div class="info-box">依赖经验参数 (力场)</div><div class="info-box">固定点电荷近似</div><div class="info-box">主要捕捉构象与空间位阻</div>`;
                break;
            case 'app':
                qcHTML = `<div class="info-box">酶的催化反应机理</div><div class="info-box">光合作用中的电子转移</div><div class="info-box">精确的配体结合能 (含极化)</div>`;
                mmHTML = `<div class="info-box">蛋白质三级结构折叠</div><div class="info-box">长达微秒级的分子动力学(MD)</div><div class="info-box">高通量虚拟筛选(Docking)</div>`;
                break;
        }

        qcDisplay.innerHTML = qcHTML;
        mmDisplay.innerHTML = mmHTML;
    }

    // 绑定事件
    slider.addEventListener('input', updateView);
    dimensionSelect.addEventListener('change', updateView);

    // 初始化渲染
    updateView();
</script>

</body>
</html>
