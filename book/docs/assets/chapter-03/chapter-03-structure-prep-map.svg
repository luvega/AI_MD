<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">第 3 章结构建模、结合位点与体系准备教学图</title>
  <desc id="desc">本图展示结构来源、体系组分、结合位点、准备操作、QC 交接和证据边界之间的关系。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .box { rx: 14; ry: 14; stroke-width: 2.5; }
      .box-title { font: 700 21px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .box-text { font: 400 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #334155; }
      .small { font: 400 14px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrowhead); }
      .boundary { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; }
      .boundary-title { font: 700 20px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #9a3412; }
      .boundary-text { font: 400 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #7c2d12; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <text class="title" x="60" y="70">第 3 章：结构进入对接前的质量门槛</text>
  <text class="subtitle" x="60" y="105">目标不是先跑 docking，而是把结构来源、结合位点、组分取舍和 QC 记录清楚。</text>

  <rect class="box" x="60" y="165" width="240" height="150" fill="#e0f2fe" stroke="#0284c7"/>
  <text class="box-title" x="85" y="205">1. 结构来源</text>
  <text class="box-text" x="85" y="240">实验结构 / 同源模型</text>
  <text class="box-text" x="85" y="270">AI 预测结构</text>
  <text class="small" x="85" y="298">检查链、构象、缺失区、置信度</text>

  <rect class="box" x="360" y="165" width="240" height="150" fill="#dcfce7" stroke="#16a34a"/>
  <text class="box-title" x="385" y="205">2. 体系组分</text>
  <text class="box-text" x="385" y="240">蛋白 / 配体 / 核酸</text>
  <text class="box-text" x="385" y="270">金属 / 辅因子 / 水</text>
  <text class="small" x="385" y="298">逐项记录保留、删除和理由</text>

  <rect class="box" x="660" y="165" width="240" height="150" fill="#fef3c7" stroke="#d97706"/>
  <text class="box-title" x="685" y="205">3. 结合位点</text>
  <text class="box-text" x="685" y="240">共晶配体 / 文献残基</text>
  <text class="box-text" x="685" y="270">预测口袋 / 任务假设</text>
  <text class="small" x="685" y="298">位点是候选区域，不是结论</text>

  <rect class="box" x="960" y="165" width="180" height="150" fill="#ede9fe" stroke="#7c3aed"/>
  <text class="box-title" x="985" y="205">4. 准备操作</text>
  <text class="box-text" x="985" y="240">质子化 / 电荷</text>
  <text class="box-text" x="985" y="270">构象 / 格式转换</text>
  <text class="small" x="985" y="298">所有假设都要可追溯</text>

  <path class="arrow" d="M300 240 H348"/>
  <path class="arrow" d="M600 240 H648"/>
  <path class="arrow" d="M900 240 H948"/>

  <rect class="box" x="255" y="420" width="310" height="155" fill="#f1f5f9" stroke="#475569"/>
  <text class="box-title" x="285" y="462">component manifest</text>
  <text class="box-text" x="285" y="497">每个组分一行</text>
  <text class="box-text" x="285" y="527">记录 role、source、keep_status</text>
  <text class="small" x="285" y="555">输出：可下载 TSV 练习模板</text>

  <rect class="box" x="635" y="420" width="310" height="155" fill="#f1f5f9" stroke="#475569"/>
  <text class="box-title" x="665" y="462">对接前 QC</text>
  <text class="box-text" x="665" y="497">结构来源可追溯</text>
  <text class="box-text" x="665" y="527">位点依据和组分取舍明确</text>
  <text class="small" x="665" y="555">输出：go / review / no-go</text>

  <path class="arrow" d="M480 315 V405"/>
  <path class="arrow" d="M780 315 V405"/>
  <path class="arrow" d="M565 498 H623"/>

  <rect class="boundary" x="60" y="620" width="1080" height="58" rx="14" ry="14"/>
  <text class="boundary-title" x="90" y="655">证据边界</text>
  <text class="boundary-text" x="210" y="655">预测结构、预测口袋、Chai-1 score、Boltz2 predicted affinity 和 docking score 只作为假设或排序线索，不能写成实验结合结论。</text>
</svg>
