site_name: "AI 辅助药物设计：从分子建模到研究工作台"
site_description: "基于 AI_MD LLM Wiki 生成的课程讲义型在线书籍"
site_author: "AI_MD"
site_url: "https://luvega.github.io/AI_MD/"
docs_dir: docs
site_dir: site
use_directory_urls: false

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: teal
      accent: deep orange

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 主章节:
      - 第 1 章 Linux 与生化计算基础: chapters/chapter-01.md
      - 第 2 章 结构来源与可视化: chapters/chapter-02.md
      - 第 3 章 对接与虚拟筛选: chapters/chapter-03.md
      - 第 4 章 分子模拟与 MD 解释: chapters/chapter-04.md
      - 第 5 章 亲和力预测与模型评估: chapters/chapter-05.md
      - 第 6 章 蛋白设计: chapters/chapter-06.md
      - 第 7 章 AI Agent 工作流: chapters/chapter-07.md
      - 第 8 章 研究思路解析: chapters/chapter-08.md
  - 附录:
      - 附录 A 研究问题与项目池: appendices/research-workbench.md
      - 附录 B 实验记录模板索引: appendices/experiment-templates.md
      - 附录 C 参考文献表: appendices/references.md
      - 附录 D AI 回归评测任务: appendices/ai-eval.md
      - 附录 E 知识边界与版权说明: appendices/boundaries.md
  - 课程资源:
      - 代码案例索引: resources/code-cases.md
      - 截图索引: resources/screenshot-index.md
      - Imagegen 图谱与 Prompt: resources/imagegen-prompts.md
      - Mermaid 图示与示意图设计: resources/mermaid-schematics.md
      - 复现实验资源: resources/reproducible-labs.md
      - AIDD dry-run 数据流程: resources/aidd-dry-runs.md
      - 中文教材正文风格指南: resources/style-guide.md
