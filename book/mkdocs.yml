site_name: "AI 辅助药物设计：从分子建模到研究工作台"
site_description: "面向药物化学、药学和生命科学学习者的 AI 辅助药物设计在线教材"
site_url: "https://luvega.github.io/AI_MD/"
docs_dir: "docs"
site_dir: "site"

theme:
  name: material
  language: zh
  palette:
    scheme: default
    primary: blue
    accent: light blue
  font:
    text: "Noto Sans SC"
    code: "Roboto Mono"
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy

extra_css:
  - stylesheets/blue-white.css

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - 首页: index.md
  - 第 1 章 Linux、计算环境与生化文件基础: chapters/chapter-01.md
  - 第 2 章 PyMOL、ChimeraX 与结构可视化: chapters/chapter-02.md
  - 第 3 章 结构建模、结合位点与体系准备: chapters/chapter-03.md
  - 第 4 章 分子对接与虚拟筛选: chapters/chapter-04.md
  - 第 5 章 分子动力学模拟基础流程: chapters/chapter-05.md
  - 第 6 章 轨迹分析、构象解释与 AI 采样: chapters/chapter-06.md
  - 第 7 章 结合自由能与 MM/PBSA 计算: chapters/chapter-07.md
  - 第 8 章 AI 亲和力预测与模型评估: chapters/chapter-08.md
  - 第 9 章 生成式蛋白设计基础: chapters/chapter-09.md
  - 第 10 章 RFD3、ProteinMPNN 与多类型设计任务: chapters/chapter-10.md
  - 第 11 章 VibeCoding、Claude Code 与 AI Agent 工作流: chapters/chapter-11.md
  - 第 12 章 研究思路解析与项目工作台: chapters/chapter-12.md
